<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura 工具</title>
    <link rel="stylesheet" href="aura_tool/css/style.css?v=2026.03.31-1">
</head>
<body>
    <div class="page-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">Aura 工具</h1>
            <button class="guide-entry-btn" type="button" onclick="openGuideModal()" aria-label="打开操作指南">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="9"></circle>
                    <path d="M9.09 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"></path>
                    <path d="M12 17h.01"></path>
                </svg>
                <span>操作指南</span>
            </button>
        </div>

        <!-- 主容器 -->
        <div class="main-card">
            <!-- 环境选择 -->
            <div class="env-section">
                <span class="env-text">选择环境</span>
                <div class="env-switch" role="radiogroup" aria-label="环境选择">
                    <input type="radio" name="env" id="env-sit" value="sit" checked>
                    <label for="env-sit">SIT</label>
                    <input type="radio" name="env" id="env-stg" value="stg">
                    <label for="env-stg">STG</label>
                    <span class="env-indicator"></span>
                </div>
            </div>

            <!-- 功能模块卡片 -->
            <div class="module-grid">
                <div class="module-card active" data-module="message">
                    <div class="module-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                        </svg>
                    </div>
                    <div class="module-info">
                        <div class="module-title">消息查询</div>
                        <div class="module-desc">按商户与时间区间查询消息明细</div>
                    </div>
                </div>
                <div class="module-card" data-module="persona">
                    <div class="module-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                            <circle cx="12" cy="7" r="4"/>
                        </svg>
                    </div>
                    <div class="module-info">
                        <div class="module-title">人设查询</div>
                        <div class="module-desc">查询商户AI助手人设配置</div>
                    </div>
                </div>
                <div class="module-card" data-module="merchant">
                    <div class="module-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                            <polyline points="9 22 9 12 15 12 15 22"/>
                        </svg>
                    </div>
                    <div class="module-info">
                        <div class="module-title">店铺数据查询</div>
                        <div class="module-desc">查询商户店铺与平台信息</div>
                    </div>
                </div>
                <div class="module-card" data-module="statistics">
                    <div class="module-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 20V10"/>
                            <path d="M18 20V4"/>
                            <path d="M6 20v-6"/>
                        </svg>
                    </div>
                    <div class="module-info">
                        <div class="module-title">统计数据</div>
                        <div class="module-desc">按商户与时间范围生成会话统计</div>
                    </div>
                </div>
            </div>

            <div class="divider"></div>

            <!-- 表单区域 -->
            <div class="form-section">
                <!-- 消息查询表单 -->
                <div id="messageForm" class="module-form">
                    <div class="form-group">
                        <label for="merchantInput">选择商户</label>
                        <div class="merchant-picker">
                            <input type="text" id="merchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                            <input type="hidden" id="merchantId">
                            <div id="merchantDropdown" class="dropdown" style="display: none;"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="startTime">开始时间</label>
                            <input type="datetime-local" id="startTime" required>
                        </div>
                        <div class="form-group">
                            <label for="endTime">结束时间</label>
                            <input type="datetime-local" id="endTime" required>
                        </div>
                    </div>
                    <div class="hint">时间跨度最长 7 天</div>

                    <div class="form-group">
                        <label for="email">Email（可选）</label>
                        <input type="text" id="email" placeholder="输入邮箱接收结果">
                    </div>

                    <button class="btn-primary" onclick="fetchMessages()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        查询消息
                    </button>
                </div>

                <!-- 人设查询表单 -->
                <div id="personaForm" class="module-form" style="display: none;">
                    <div class="form-group">
                        <label for="personaMerchantInput">选择商户</label>
                        <div class="merchant-picker">
                            <input type="text" id="personaMerchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                            <input type="hidden" id="personaMerchantId">
                            <div id="personaMerchantDropdown" class="dropdown" style="display: none;"></div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="fetchPersona()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        查询人设
                    </button>
                </div>

                <!-- 店铺数据信息查询表单 -->
                <div id="merchantInfoForm" class="module-form" style="display: none;">
                    <div class="form-group">
                        <label for="merchantInfoInput">选择商户</label>
                        <div class="merchant-picker">
                            <input type="text" id="merchantInfoInput" placeholder="输入商户名称搜索..." autocomplete="off">
                            <input type="hidden" id="merchantInfoMerchantId">
                            <div id="merchantInfoDropdown" class="dropdown" style="display: none;"></div>
                        </div>
                    </div>

                    <button class="btn-primary" onclick="fetchMerchantInfo()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        查询店铺信息
                    </button>
                </div>

                <!-- 统计数据查询表单 -->
                <div id="statisticsForm" class="module-form" style="display: none;">
                    <div class="form-group">
                        <label for="statsMerchantInput">选择商户</label>
                        <div class="merchant-picker">
                            <input type="text" id="statsMerchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                            <input type="hidden" id="statsMerchantId">
                            <div id="statsMerchantDropdown" class="dropdown" style="display: none;"></div>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="statsStartTime">开始时间</label>
                            <input type="datetime-local" id="statsStartTime" required>
                        </div>
                        <div class="form-group">
                            <label for="statsEndTime">结束时间</label>
                            <input type="datetime-local" id="statsEndTime" required>
                        </div>
                    </div>
                    <div class="hint">时间跨度最长 7 天</div>

                    <button class="btn-primary" onclick="fetchStatistics()">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        查询统计数据
                    </button>
                </div>
            </div>
        </div>

        <!-- 加载状态 -->
        <div id="loading" class="loading" style="display: none;">
            <div class="spinner"></div>
            <span>加载中...</span>
        </div>

        <!-- 错误提示 -->
        <div id="error" class="error" style="display: none;"></div>

        <!-- 结果区域 -->
        <div id="results" class="results"></div>
    </div>

    <!-- 图片弹窗 -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <!-- 悬浮窗口遮罩层 -->
    <div id="popoverOverlay" class="popover-overlay"></div>

    <!-- 用户信息悬浮窗口 -->
    <div id="userInfoPopover" class="user-info-popover">
        <div class="popover-header">
            <span class="popover-title">用户信息</span>
            <button class="popover-close" onclick="closeUserInfoPopover()">&times;</button>
        </div>
        <div class="popover-content" id="popoverContent">
            <div class="popover-loading">加载中...</div>
        </div>
    </div>

    <!-- 操作指南浮窗 -->
    <div id="guideModalOverlay" class="guide-modal-overlay">
        <div id="guideModal" class="guide-modal" role="dialog" aria-modal="true" aria-labelledby="guideModalTitle">
            <div class="guide-modal-header">
                <div class="guide-modal-title-group">
                    <div id="guideModalTitle" class="guide-modal-title">Aura 工具操作指南</div>
                    <div id="guideVersionText" class="guide-modal-version"></div>
                </div>
                <button class="popover-close" type="button" onclick="closeGuideModal()">&times;</button>
            </div>
            <div id="guideContent" class="guide-modal-content">
                <div class="popover-loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 一次性更新公告 -->
    <div id="guideAnnouncement" class="guide-announcement">
        <div class="guide-announcement-card">
            <div class="guide-announcement-header">
                <div>
                    <div class="guide-announcement-title">Aura 工具已更新</div>
                    <div id="guideAnnouncementVersion" class="guide-announcement-version"></div>
                </div>
                <button class="guide-announcement-close" type="button" onclick="dismissGuideAnnouncement()">&times;</button>
            </div>
            <div id="guideAnnouncementBody" class="guide-announcement-body"></div>
            <div class="guide-announcement-actions">
                <button class="jump-btn jump-btn-admin" type="button" onclick="dismissGuideAnnouncement()">我知道了</button>
                <button class="jump-btn jump-btn-frontend" type="button" onclick="openGuideFromAnnouncement()">查看指南</button>
            </div>
        </div>
    </div>

    <script src="aura_tool/js/main.js?v=2026.03.31-1"></script>
</body>
</html>
