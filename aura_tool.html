<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura 工具</title>
    <script>
        (function () {
            const THEME_STORAGE_KEY = 'aura_theme';
            let resolvedTheme = 'light';

            try {
                const storedTheme = localStorage.getItem(THEME_STORAGE_KEY);
                if (storedTheme === 'light' || storedTheme === 'dark') {
                    resolvedTheme = storedTheme;
                } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                    resolvedTheme = 'dark';
                }
            } catch (error) {
                resolvedTheme = 'light';
            }

            document.documentElement.setAttribute('data-theme', resolvedTheme);
            document.documentElement.style.colorScheme = resolvedTheme;
        }());
    </script>
    <link rel="stylesheet" href="aura_tool/css/style.css?v=2026.04.14-1">
</head>
<body>
    <div class="page-wrapper">
        <!-- 页面标题 -->
        <div class="page-header">
            <h1 class="page-title">Aura 工具</h1>
            <div class="header-actions">
                <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换到夜间模式" aria-pressed="false">
                    <span class="theme-toggle-track" aria-hidden="true">
                        <span class="theme-toggle-track-icon theme-toggle-track-icon-sun">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="4"></circle>
                                <path d="M12 2v2.2"></path>
                                <path d="M12 19.8V22"></path>
                                <path d="m4.93 4.93 1.56 1.56"></path>
                                <path d="m17.51 17.51 1.56 1.56"></path>
                                <path d="M2 12h2.2"></path>
                                <path d="M19.8 12H22"></path>
                                <path d="m4.93 19.07 1.56-1.56"></path>
                                <path d="m17.51 6.49 1.56-1.56"></path>
                            </svg>
                        </span>
                        <span class="theme-toggle-track-icon theme-toggle-track-icon-moon">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 12.79A9 9 0 1 1 11.21 3c-.12.57-.21 1.16-.21 1.79A8 8 0 0 0 19 12.8c.64 0 1.26-.08 1.85-.21z"></path>
                            </svg>
                        </span>
                        <span class="theme-toggle-thumb">
                            <span class="theme-toggle-thumb-icon theme-toggle-thumb-icon-sun">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="4"></circle>
                                    <path d="M12 2v2.2"></path>
                                    <path d="M12 19.8V22"></path>
                                    <path d="m4.93 4.93 1.56 1.56"></path>
                                    <path d="m17.51 17.51 1.56 1.56"></path>
                                    <path d="M2 12h2.2"></path>
                                    <path d="M19.8 12H22"></path>
                                    <path d="m4.93 19.07 1.56-1.56"></path>
                                    <path d="m17.51 6.49 1.56-1.56"></path>
                                </svg>
                            </span>
                            <span class="theme-toggle-thumb-icon theme-toggle-thumb-icon-moon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 12.79A9 9 0 1 1 11.21 3c-.12.57-.21 1.16-.21 1.79A8 8 0 0 0 19 12.8c.64 0 1.26-.08 1.85-.21z"></path>
                                </svg>
                            </span>
                        </span>
                    </span>
                    <span class="theme-toggle-text" id="themeToggleText">日间模式</span>
                </button>
                <button class="guide-entry-btn session-ui-entry-btn" type="button" onclick="openSessionUiGuideModal()" aria-label="打开会话 UI 图例">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="4" width="18" height="16" rx="2"></rect>
                        <path d="M7 8h10"></path>
                        <path d="M7 12h6"></path>
                        <path d="M7 16h4"></path>
                    </svg>
                    <span>会话 UI 图例</span>
                </button>
                <button class="guide-entry-btn guide-entry-btn-secondary" type="button" onclick="openGuideModal()" aria-label="打开操作指南">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="9"></circle>
                        <path d="M9.09 9a3 3 0 0 1 5.82 1c0 2-3 3-3 3"></path>
                        <path d="M12 17h.01"></path>
                    </svg>
                    <span>操作指南</span>
                </button>
            </div>
        </div>

        <!-- 主容器 -->
        <div class="main-card">
            <div class="tool-layout">
                <aside class="tool-sidebar" aria-label="工具选择">
                    <div class="tool-sidebar-header">
                        <div class="tool-sidebar-title">工具选择</div>
                    </div>
                    <div class="sidebar-env-section">
                        <span class="env-text">选择环境</span>
                        <div class="env-switch" role="radiogroup" aria-label="环境选择">
                            <input type="radio" name="env" id="env-sit" value="sit" checked>
                            <label for="env-sit">SIT</label>
                            <input type="radio" name="env" id="env-stg" value="stg">
                            <label for="env-stg">STG</label>
                            <span class="env-indicator"></span>
                        </div>
                    </div>
                    <div class="module-nav-list" role="tablist" aria-label="Aura 工具功能">
                        <button class="module-nav-item active" type="button" data-module="message" aria-selected="true">
                            <span class="module-nav-label">会话查询</span>
                            <span class="module-nav-desc">按商户与时间区间筛会话摘要</span>
                        </button>
                        <button class="module-nav-item" type="button" data-module="persona" aria-selected="false">
                            <span class="module-nav-label">人设查询</span>
                            <span class="module-nav-desc">查询商户 AI 助手人设配置</span>
                        </button>
                        <button class="module-nav-item" type="button" data-module="merchant" aria-selected="false">
                            <span class="module-nav-label">店铺数据查询</span>
                            <span class="module-nav-desc">查询商户店铺与平台信息</span>
                        </button>
                        <button class="module-nav-item" type="button" data-module="statistics" aria-selected="false">
                            <span class="module-nav-label">统计数据</span>
                            <span class="module-nav-desc">按商户与时间范围生成会话统计</span>
                        </button>
                    </div>
                </aside>

                <div class="tool-content">
                    <!-- 表单区域 -->
                    <div class="form-section">
                        <!-- 会话查询表单 -->
                        <div id="messageForm" class="module-form">
                            <div class="form-group">
                                <label for="merchantInput">选择商户</label>
                                <div class="merchant-picker">
                                    <input type="text" id="merchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                                    <input type="hidden" id="merchantId">
                                    <div id="merchantDropdown" class="dropdown" style="display: none;"></div>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="startTime">开始时间</label>
                                    <input type="datetime-local" id="startTime" required>
                                </div>
                                <div class="form-group">
                                    <label for="endTime">结束时间</label>
                                    <input type="datetime-local" id="endTime" required>
                                </div>
                            </div>
                            <div class="hint">时间跨度最长 7 天</div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="feedbackStatus">反馈状态（可选）</label>
                                    <select id="feedbackStatus">
                                        <option value="">全部</option>
                                    </select>
                                </div>
                                <div class="form-group">
                                    <label for="isTurnHuman">是否转人工（可选）</label>
                                    <select id="isTurnHuman">
                                        <option value="">全部</option>
                                        <option value="true">是</option>
                                        <option value="false">否</option>
                                    </select>
                                </div>
                            </div>

                            <div class="form-group">
                                <label for="email">Email（可选）</label>
                                <input type="text" id="email" placeholder="例如：PJY2077@gmail.com">
                            </div>

                            <button class="btn-primary" onclick="fetchMessages()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.35-4.35"/>
                                </svg>
                                查询会话
                            </button>
                        </div>

                        <!-- 人设查询表单 -->
                        <div id="personaForm" class="module-form" style="display: none;">
                            <div class="form-group">
                                <label for="personaMerchantInput">选择商户</label>
                                <div class="merchant-picker">
                                    <input type="text" id="personaMerchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                                    <input type="hidden" id="personaMerchantId">
                                    <div id="personaMerchantDropdown" class="dropdown" style="display: none;"></div>
                                </div>
                            </div>

                            <button class="btn-primary" onclick="fetchPersona()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.35-4.35"/>
                                </svg>
                                查询人设
                            </button>
                        </div>

                        <!-- 店铺数据信息查询表单 -->
                        <div id="merchantInfoForm" class="module-form" style="display: none;">
                            <div class="form-group">
                                <label for="merchantInfoInput">选择商户</label>
                                <div class="merchant-picker">
                                    <input type="text" id="merchantInfoInput" placeholder="输入商户名称搜索..." autocomplete="off">
                                    <input type="hidden" id="merchantInfoMerchantId">
                                    <div id="merchantInfoDropdown" class="dropdown" style="display: none;"></div>
                                </div>
                            </div>

                            <button class="btn-primary" onclick="fetchMerchantInfo()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.35-4.35"/>
                                </svg>
                                查询店铺信息
                            </button>
                        </div>

                        <!-- 统计数据查询表单 -->
                        <div id="statisticsForm" class="module-form" style="display: none;">
                            <div class="form-group">
                                <label for="statsMerchantInput">选择商户</label>
                                <div class="merchant-picker">
                                    <input type="text" id="statsMerchantInput" placeholder="输入商户名称搜索..." autocomplete="off">
                                    <input type="hidden" id="statsMerchantId">
                                    <div id="statsMerchantDropdown" class="dropdown" style="display: none;"></div>
                                </div>
                            </div>

                            <div class="form-row">
                                <div class="form-group">
                                    <label for="statsStartTime">开始时间</label>
                                    <input type="datetime-local" id="statsStartTime" required>
                                </div>
                                <div class="form-group">
                                    <label for="statsEndTime">结束时间</label>
                                    <input type="datetime-local" id="statsEndTime" required>
                                </div>
                            </div>
                            <div class="hint">时间跨度最长 7 天</div>

                            <button class="btn-primary" onclick="fetchStatistics()">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="11" cy="11" r="8"/>
                                    <path d="m21 21-4.35-4.35"/>
                                </svg>
                                查询统计数据
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="resultShell" class="result-shell">
            <!-- 加载状态 -->
            <div id="loading" class="loading" aria-live="polite" aria-hidden="true">
                <div class="loading-card">
                    <div class="spinner loading-spinner"></div>
                    <span class="loading-text">加载中...</span>
                </div>
            </div>

            <!-- 错误提示 -->
            <div id="error" class="error" style="display: none;"></div>

            <!-- 结果区域 -->
            <div id="results" class="results"></div>
        </div>
    </div>

    <!-- 图片弹窗 -->
    <div id="imageModal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img class="modal-content" id="modalImage">
    </div>

    <!-- 悬浮窗口遮罩层 -->
    <div id="popoverOverlay" class="popover-overlay"></div>

    <!-- 用户信息悬浮窗口 -->
    <div id="userInfoPopover" class="user-info-popover" role="dialog" aria-modal="false" aria-labelledby="userInfoPopoverTitle">
        <div class="user-info-popover-surface">
            <div class="popover-header">
                <span id="userInfoPopoverTitle" class="popover-title">用户信息</span>
                <button class="popover-close" onclick="closeUserInfoPopover()">&times;</button>
            </div>
            <div class="popover-content" id="popoverContent">
                <div class="popover-loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 操作指南浮窗 -->
    <div id="guideModalOverlay" class="guide-modal-overlay">
        <div id="guideModal" class="guide-modal" role="dialog" aria-modal="true" aria-labelledby="guideModalTitle">
            <div class="guide-modal-header">
                <div class="guide-modal-title-group">
                    <div id="guideModalTitle" class="guide-modal-title">Aura 工具操作指南</div>
                    <div id="guideVersionText" class="guide-modal-version"></div>
                </div>
                <button class="popover-close" type="button" onclick="closeGuideModal()">&times;</button>
            </div>
            <div id="guideContent" class="guide-modal-content">
                <div class="popover-loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="aura_tool/js/main.js?v=2026.04.14-1"></script>
</body>
</html>
